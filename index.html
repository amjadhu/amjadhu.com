<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amjad Hussain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="bg"></canvas>
  <main>
    <h1>Amjad Hussain</h1>
    <a href="https://www.linkedin.com/in/amjadhu/" target="_blank" rel="noopener noreferrer">Connect on LinkedIn</a>
  </main>
  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let w, h;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const orbs = Array.from({ length: 5 }, (_, i) => ({
      x: Math.random() * w,
      y: Math.random() * h,
      r: 120 + Math.random() * 150,
      dx: (Math.random() - 0.5) * 0.4,
      dy: (Math.random() - 0.5) * 0.4,
      hue: [235, 260, 210, 280, 195][i],
      alpha: 0.08 + Math.random() * 0.06,
      phase: Math.random() * Math.PI * 2
    }));

    function draw(t) {
      ctx.clearRect(0, 0, w, h);
      for (const orb of orbs) {
        orb.x += orb.dx;
        orb.y += orb.dy;

        // Gentle breathing
        const pulse = Math.sin(t * 0.0005 + orb.phase) * 0.3 + 1;

        // Soft bounce off edges
        if (orb.x < -orb.r) orb.x = w + orb.r;
        if (orb.x > w + orb.r) orb.x = -orb.r;
        if (orb.y < -orb.r) orb.y = h + orb.r;
        if (orb.y > h + orb.r) orb.y = -orb.r;

        const grad = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.r * pulse);
        grad.addColorStop(0, `hsla(${orb.hue}, 70%, 60%, ${orb.alpha * pulse})`);
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(orb.x - orb.r * pulse, orb.y - orb.r * pulse, orb.r * 2 * pulse, orb.r * 2 * pulse);
      }
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  </script>
</body>
</html>
